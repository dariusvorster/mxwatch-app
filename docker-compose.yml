services:
  # One-shot schema push. Runs on `docker compose up` before the app starts and
  # exits on success. Idempotent — safe to rerun after schema changes via:
  #   docker compose run --rm mxwatch-migrate
  mxwatch-migrate:
    build:
      context: .
      target: migrator
    env_file:
      - .env
    environment:
      # Override so migrate always targets the container volume regardless of
      # what DATABASE_URL is in the host's .env.
      DATABASE_URL: /data/mxwatch.db
    volumes:
      - mxwatch-data:/data
    restart: "no"

  mxwatch:
    build:
      context: .
      target: runner
    container_name: mxwatch
    restart: unless-stopped
    depends_on:
      mxwatch-migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"   # Web UI
      - "2525:2525"   # DMARC SMTP listener (non-root port)
    # Pin public resolvers so RBL / DNS monitors don't silently fail on hosts
    # with broken systemd-resolved or restrictive bridge DNS.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      # Containerised path overrides whatever's in .env.
      DATABASE_URL: /data/mxwatch.db
      # Fail-fast if the host forgot to set the secret.
      MXWATCH_SECRET: ${MXWATCH_SECRET:?set MXWATCH_SECRET in .env}
      # Default port matches the listener inside the container.
      SMTP_PORT: ${SMTP_PORT:-2525}
      # Phase-8 logging config. Pinning the dir inside the container volume
      # keeps rotated files on the same persistent mount as the DB.
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /data/logs
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
    volumes:
      - mxwatch-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  mxwatch-data:
